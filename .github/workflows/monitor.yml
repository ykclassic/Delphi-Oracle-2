name: Delphi Oracle - Trade Monitor

on:
  schedule:
    - cron: '*/15 * * * 1-5'  # Every 15 minutes (Mon–Fri UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-trades:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT REPO
      # =========================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for commits

      # =========================
      # SETUP PYTHON
      # =========================
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # RUN MONITOR ENGINE
      # =========================
      - name: 🚀 Run Trade Monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}  # ✅ FIXED
        run: |
          echo "Running trade monitor..."
          python run_monitor.py

      # =========================
      # COMMIT UPDATED LOGS
      # =========================
      - name: 💾 Commit & Push Trade Updates
        run: |
          git config --global user.name "Delphi-Monitor-Bot"
          git config --global user.email "bot@delphi-oracle.local"

          # Ensure logs folder exists
          mkdir -p logs

          if [ -f logs/trade_log.csv ]; then
            git add logs/trade_log.csv

            # Only commit if changes exist
            if ! git diff --quiet && ! git diff --staged --quiet; then
              git commit -m "📈 Update: Trade Outcomes [skip ci]"
              git push
            else
              echo "No changes to commit."
            fi
          else
            echo "No trade_log.csv found. Skipping commit."
