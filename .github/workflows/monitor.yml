name: Delphi Oracle - Trade Monitor

on:
  schedule:
    - cron: '*/15 * * * 1-5'   # Every 15 minutes, Mon–Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-trades:
    runs-on: ubuntu-latest

    # Prevent race conditions with main.yml
    concurrency:
      group: trade-log
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Run Trade Monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -c "
import yaml
from core.monitor import SignalMonitor

config = yaml.safe_load(open('config/settings.yaml'))
monitor = SignalMonitor(config)
updates = monitor.check_outcomes()

print('Updates:', updates)
"

      - name: 💾 Commit Updated Trade Outcomes
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@oracle.local"

          if [ -f logs/trade_log.csv ]; then
            git add logs/trade_log.csv
            git diff --quiet && git diff --staged --quiet || \
            (git commit -m "📈 Update trade outcomes [skip ci]" && git push)
          else
            echo "No trade log found."
          fi
