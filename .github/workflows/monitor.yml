name: Delphi Oracle - Trade Monitor

on:
  schedule:
    - cron: '*/15 * * * 1-5' # Runs every 15 minutes, Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-trades:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # This ensures 'yaml', 'pandas', and 'requests' are installed
          pip install -r requirements.txt

      - name: 🚀 Run Monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python run_monitor.py

      - name: 💾 Sync Trade Outcomes
        run: |
          git config --global user.name "Delphi-Monitor-Bot"
          git config --global user.email "bot@delphi-oracle.local"
          
          if [ -f "logs/trade_log.csv" ]; then
            git add logs/trade_log.csv
            git diff --quiet && git diff --staged --quiet || (git commit -m "📈 Update: Trade Outcomes [skip ci]" && git push)
          else
            echo "No log file found to update."
          fi
