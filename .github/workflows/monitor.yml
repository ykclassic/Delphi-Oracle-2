name: Delphi Oracle - Trade Monitor

on:
  schedule:
    - cron: '*/15 * * * 1-5'   # Every 15 minutes (Mon–Fri UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-trades:
    runs-on: ubuntu-latest

    # Prevent concurrent writes to trade_log.csv
    concurrency:
      group: trade-log
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Run Trade Monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<EOF
import yaml
import logging
from core.monitor import SignalMonitor

logging.basicConfig(level=logging.INFO)

# Load config
with open("config/settings.yaml", "r") as f:
    config = yaml.safe_load(f)

# Inject webhook from GitHub Secrets
import os
webhook = os.getenv("DISCORD_WEBHOOK_URL")
if webhook:
    config["discord"]["webhook_url"] = webhook

monitor = SignalMonitor(config)
updates = monitor.check_outcomes()

if updates:
    print("Trade Updates:")
    for u in updates:
        print("-", u)
else:
    print("No trade updates.")
EOF

      - name: 💾 Commit Updated Trade Log
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@delphi-oracle.local"

          if [ -f logs/trade_log.csv ]; then
            git add logs/trade_log.csv
            git diff --quiet && git diff --staged --quiet || \
            (git commit -m "📈 Update trade outcomes [skip ci]" && git push)
          else
            echo "No trade log found."
          fi

      - name: ⚠️ Fail Gracefully
        if: failure()
        run: echo "Monitor job failed but workflow handled safely."
