name: Delphi Oracle - 24/5 Signal Engine

on:
  schedule:
    # Runs at the top of every hour, Monday through Friday (UTC)
    - cron: '0 * * * 1-5'
  workflow_dispatch:
    # Allows you to manually trigger the bot for testing
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual Verification'

permissions:
  contents: write  # Critical for allowing the bot to save trade_log.csv

jobs:
  trade-scan:
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so it can push logs back

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run Delphi Oracle
        env:
          # Injected from GitHub Settings > Secrets and Variables > Actions
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: 💾 Commit & Sync Performance Logs
        run: |
          git config --global user.name "Delphi-Oracle-Runner"
          git config --global user.email "bot@delphi-oracle.local"
          
          # Check if the log file exists and has changes
          if [ -f "logs/trade_log.csv" ]; then
            git add logs/trade_log.csv
            # Only commit if there are actual changes to the CSV
            git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Update: Performance Logs [skip ci]" && git push)
          else
            echo "No log file found to commit."
          fi
