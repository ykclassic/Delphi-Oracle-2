name: Delphi Oracle Alpha 2026 - Daily Monitor

on:
  schedule:
    # Runs every 1 hour (Adjust as needed for Lagos trading times)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  monitor-markets:
    runs-on: ubuntu-latest
    
    env:
      # Map your GitHub Secrets to Environment Variables
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
      MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
      MT5_SERVER: ${{ secrets.MT5_SERVER }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Note: MetaTrader5 will install but stay dormant on GitHub
          pip install MetaTrader5 

      - name: Run Market Scan
        # The GITHUB_ACTIONS env var tells main.py to skip MT5.initialize()
        env:
          GITHUB_ACTIONS: 'true'
        run: python main.py

      - name: Commit and Push Trading Logs
        shell: bash
        run: |
          git config --global user.name "Delphi-Oracle-Runner"
          git config --global user.email "bot@delphi-oracle.com"
          
          # Only add files if they actually exist to avoid errors
          if [ -f "delphi_oracle.log" ]; then
            git add delphi_oracle.log
          fi
          
          # Check if there are changes before committing
          if git diff --cached --quiet; then
            echo "No changes to logs, skipping commit."
          else
            git commit -m "Update Delphi Oracle Logs [skip ci]"
            git push
          fi

      - name: Upload Logs as Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delphi-market-logs
          path: |
            delphi_oracle.log
            *.csv
