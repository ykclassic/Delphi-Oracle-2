name: Delphi Oracle - Signal Engine

on:
  schedule:
    - cron: '0 * * * 1-5'   # Every hour, Mon–Fri (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade-scan:
    runs-on: ubuntu-latest

    # Prevent simultaneous writes to trade_log.csv
    concurrency:
      group: trade-log
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Delphi Oracle Scan
        run: python main.py
        env:
          # This line maps the GitHub Secret to an Environment Variable the Python script can read
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: 💾 Commit & Push Trade Logs
        run: |
          git config user.name "oracle-bot"
          git config user.email "bot@oracle.local"

          if [ -f logs/trade_log.csv ]; then
            git add logs/trade_log.csv
            git diff --quiet && git diff --staged --quiet || \
            (git commit -m "📊 Update trade logs [skip ci]" && git push)
          else
            echo "No trade log found."
          fi
