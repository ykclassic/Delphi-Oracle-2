name: Delphi Oracle - 24/5 Signal Engine

on:
  schedule:
    # Runs at the top of every hour, Monday through Friday (UTC)
    - cron: '0 * * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual Verification'

permissions:
  contents: write

jobs:
  trade-scan:
    # Changed to windows-latest for consistency with your local environment
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run Delphi Oracle
        shell: bash
        env:
          # CRITICAL: Name must be DISCORD_WEBHOOK to match main.py
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_ACTIONS: 'true'
        run: python main.py

      - name: 💾 Commit & Sync Performance Logs
        shell: bash
        run: |
          git config --global user.name "Delphi-Oracle-Runner"
          git config --global user.email "bot@delphi-oracle.local"
          
          if [ -f "logs/trade_log.csv" ]; then
            git add logs/trade_log.csv
            git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Update: Performance Logs [skip ci]" && git push)
          else
            echo "No log file found to commit."
          fi
