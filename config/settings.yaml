# ==========================================
# 🔮 DELPHI ORACLE: GLOBAL CONFIGURATION (2026)
# ==========================================

bot_name: "Delphi_Oracle_Alpha_2026"
version: "1.2.0"

# Target Assets
# Note: DataManager maps these to Yahoo formats (e.g., EURUSD=X) internally
symbols:
  - "EURUSD"  
  - "GBPUSD"  
  - "USDJPY"  
  - "AUDUSD"  
  - "USDCAD"  
  - "EURJPY"
  - "GBPJPY"
  - "XAUUSD"  
  - "XAGUSD"  
  - "BTCUSD"  
  - "ETHUSD"  
  - "SOLUSD"  

# ==========================================
# 🏦 MULTI-ACCOUNT ARCHITECTURE
# ==========================================
accounts:
  - name: "Headway_Live_Cent"
    login: 4396804
    password: "${HEADWAY_PASSWORD}" # Use a secret for your live password!
    server: "Headway-Server"       # Ensure this matches your MT5 Login exactly
    enabled: true
    risk_multiplier: 1.0
    account_type: "cent"           
    symbol_suffix: ""              # Set to ".c" if Headway uses EURUSD.c

# ==========================================
# 🛡️ RISK & EXECUTION GUARDS
# ==========================================
risk_per_trade_percent: 1.0
max_spread_allowed_pips: 3.0      
default_stop_loss_atr: 1.5
default_take_profit_ratio: 2.0

# ==========================================
# 📡 DISCORD & NOTIFICATIONS
# ==========================================
discord:
  # Python main.py will override this with DISCORD_WEBHOOK_URL from GitHub Secrets
  webhook_url: "EMPTY"
  alert_role_id: "SIGNAL_SUBSCRIBER"
  send_daily_health_report: true
